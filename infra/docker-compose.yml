# SafetyRoutes local infrastructure.
# Postgres for the app. (Artemis is brought up separately in Slice 4 — see infra/artemis.)
services:
  db:
    image: postgres:16
    container_name: safetyroutes-db
    environment:
      POSTGRES_USER: safetyroutes
      POSTGRES_PASSWORD: safetyroutes
      POSTGRES_DB: safetyroutes
    # host 5433 to avoid clashing with a local Postgres.app on 5432
    ports:
      - "5433:5432"
    volumes:
      - sr_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U safetyroutes"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  sr_pgdata:
